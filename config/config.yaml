# Altcoin Short Monitoring System Configuration

monitor:
  interval_check: 10  # Check interval in seconds
  symbols_type: "PERP"  # Only monitor perpetual contracts
  min_volume_24h: 50000000  # Minimum 24h volume (USDT)

strategy:
  # Pump detection thresholds (relative to previous day's high)
  pump_thresholds:
    moderate: 0.50    # 50-100% gain
    extreme: 1.00     # 100-200% gain
    ultra: 2.00       # 200%+ gain

  # Volume settings
  volume_multiplier: 3.0  # Current volume > avg * multiplier

  # Exhaustion detection parameters
  exhaustion:
    volume_divergence_lookback: 10   # Lookback periods for volume divergence
    rsi_divergence_threshold: 5      # RSI divergence threshold (points)
    momentum_slowdown_window: 3      # Momentum slowdown detection window

  # Short confirmation thresholds
  short_rsi: 80  # RSI above this value
  max_positions: 3  # Maximum concurrent short positions

  # Confidence scoring
  min_confidence: 0.6  # Minimum confidence to enter

risk:
  # BTC pump protection
  btc_pump_threshold: 0.01  # 1% BTC pump
  btc_pump_window: 900  # 15 minutes window

execution:
  leverage: 3  # Default leverage (2x-5x recommended)
  stop_loss: 0.05  # 5% hard stop loss
  take_profit: 0.10  # 10% take profit
  position_size_percent: 0.05  # 5% of balance per position

  # Order settings
  order_type: "MARKET"  # MARKET or LIMIT
  time_in_force: "GTC"  # GTC, IOC, FOK

api:
  binance:
    api_key: ""  # Set via environment variable BINANCE_API_KEY
    secret_key: ""  # Set via environment variable BINANCE_SECRET_KEY
    testnet: false  # Use mainnet for real market data (Phase 1 only needs public data)

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/monitor.log"
  max_size: 10485760  # 10MB
  backup_count: 5

alerts:
  enabled: true
  # Add alert channels here (Telegram, Discord, etc.)
  # telegram:
  #   bot_token: ""
  #   chat_id: ""
